<!doctype html>
<html>
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>maps-pin-picker playground</title>
	</head>
	<style>
		html,
		body {
			height: 100%;
		}

		body {
			font-family: Arial, sans-serif;
			margin: 0;
			padding: 1rem;
			box-sizing: border-box;
			background: #f7f7f8;
			color: #111;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}

		h1 {
			margin-top: 0;
		}

		.layout {
			display: grid;
			grid-template-columns: 2fr 1fr;
			gap: 24px;
			align-items: start;
			flex: 1;
			min-height: 0;
		}

		aside.card {
			max-height: 100%;
			overflow-y: auto;
		}

		.card {
			background: #fff;
			border: 1px solid #ddd;
			border-radius: 12px;
			padding: 16px;
		}

		#map {
			width: 100%;
			min-height: 420px;
			border-radius: 8px;
			background: #ececec;
		}

		#status {
			margin: 0 0 12px;
			font-weight: 700;
		}

		pre {
			margin: 0;
			padding: 12px;
			background: #111;
			color: #0f0;
			border-radius: 8px;
			overflow: auto;
			white-space: pre-wrap;
			word-break: break-word;
		}

		.actions {
			display: flex;
			gap: 12px;
			margin-top: 16px;
		}

		button {
			border: 0;
			border-radius: 8px;
			padding: 10px 14px;
			cursor: pointer;
		}

		a {
			word-break: break-all;
		}
	</style>
	<body>
		<h1>maps-pin-picker playground</h1>
		<div class="layout">
			<section class="card">
				<div id="map">
					<p style="padding: 20px; color: #666">
						Map will appear here
					</p>
				</div>
				<div class="actions">
					<button id="btn-test-url">Test buildGoogleMapsUrl</button>
					<button id="btn-reload">Run createMapPinPicker</button>
					<button id="btn-clear-logs">Clear logs</button>
				</div>
			</section>

			<aside class="card">
				<p id="status">Status: idle</p>

				<h3>Last Value</h3>
				<pre id="value-output">null</pre>

				<h3>Generated URL</h3>
				<p>
					<a
						id="maps-link"
						href="#"
						target="_blank"
						rel="noopener noreferrer"
					>
						-
					</a>
				</p>

				<h3>Logs</h3>
				<pre id="log-output"></pre>
			</aside>
		</div>

		<script type="module" src="./main.js"></script>
	</body>
</html>
